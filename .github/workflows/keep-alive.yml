name: Keep-alive (Supabase + Render)

# Mantém o backend do Render QUENTE (o plano free hiberna após ~15 min sem
# tráfego, causando cold start de ~50s na próxima visita). Pingar a cada 10
# min evita a hibernação. O /api/health faz uma consulta real no banco, o que
# também conta como atividade no Supabase e impede a pausa automática dele.
# Obs.: o cron do GitHub Actions pode atrasar alguns minutos sob carga. Para
# produção de verdade, considere um monitor externo (cron-job.org a cada 5min)
# ou um plano pago do Render (sem hibernação).

on:
  schedule:
    - cron: "*/10 * * * *"  # a cada 10 minutos (mantém o Render quente)
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: |
          curl --fail --silent --show-error \
            --max-time 120 --retry 3 --retry-delay 30 --retry-all-errors \
            https://inksa-auth-flask-dev.onrender.com/api/health
          echo "Ping OK"
